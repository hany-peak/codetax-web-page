<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>피드 · 코드세무회계</title>
<meta name="description" content="코드세무회계 피드 - 세무, 절세, 사업 운영에 도움되는 콘텐츠를 만나보세요.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue: #3182f6;
    --ink: #191f28;
    --ink-secondary: #333d4b;
    --ink-tertiary: #6b7684;
    --ink-muted: #8b95a1;
    --surface: #ffffff;
    --surface-alt: #f9fafb;
    --surface-gray: #f2f4f6;
    --border: #e5e8eb;
    --green: #0A7C55;
    --green-light: #e8faf1;
  }

  html { font-size: 16px; scroll-behavior: smooth; word-break: keep-all; }

  body {
    font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--surface);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  /* ── NAV ── */
  .nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }
  .nav-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 40px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .nav-logo {
    font-size: 1.15rem;
    font-weight: 800;
    color: var(--green);
    text-decoration: none;
    letter-spacing: -0.03em;
  }
  .nav-links {
    display: flex;
    gap: 32px;
    align-items: center;
    list-style: none;
  }
  .nav-links a {
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--ink-secondary);
    text-decoration: none;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--ink); }
  .nav-links a.active { color: var(--ink); }
  .nav-cta {
    background: var(--ink);
    color: #fff !important;
    padding: 8px 18px;
    border-radius: 8px;
    font-size: 0.85rem !important;
    transition: background 0.2s !important;
  }
  .nav-cta:hover { background: var(--ink-secondary) !important; }
  .nav-toggle {
    display: none;
    background: none;
    border: none;
    cursor: pointer;
    padding: 8px;
  }
  .nav-toggle svg { width: 22px; height: 22px; stroke: var(--ink); }

  /* ── PAGE HEADER ── */
  .page-header {
    max-width: 1200px;
    margin: 0 auto;
    padding: 64px 40px 0;
  }
  .page-title {
    font-size: 2.5rem;
    font-weight: 800;
    letter-spacing: -0.04em;
    color: var(--ink);
    margin-bottom: 12px;
  }
  .page-desc {
    font-size: 1.05rem;
    color: var(--ink-tertiary);
    line-height: 1.6;
  }

  /* ── CATEGORY TABS ── */
  .tabs {
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px 40px 0;
    display: flex;
    gap: 8px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    padding: 10px 18px;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--ink-tertiary);
    background: none;
    border: none;
    cursor: pointer;
    white-space: nowrap;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.2s;
  }
  .tab:hover { color: var(--ink); }
  .tab.active {
    color: var(--ink);
    border-bottom-color: var(--ink);
  }

  /* ── FEATURED ── */
  .featured {
    max-width: 1200px;
    margin: 0 auto;
    padding: 48px 40px 0;
  }
  .featured-card {
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 48px;
    align-items: center;
    background: var(--surface-gray);
    border-radius: 20px;
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    transition: background 0.2s;
  }
  .featured-card:hover { background: var(--border); }
  .featured-img {
    width: 100%;
    aspect-ratio: 16/10;
    object-fit: cover;
    display: block;
  }
  .featured-body { padding: 40px 40px 40px 0; }
  .featured-tag {
    display: inline-block;
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--green);
    margin-bottom: 12px;
  }
  .featured-title {
    font-size: 1.75rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.4;
    margin-bottom: 12px;
    color: var(--ink);
  }
  .featured-desc {
    font-size: 1rem;
    color: var(--ink-tertiary);
    line-height: 1.7;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* ── ARTICLE GRID ── */
  .feed-grid-wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: 48px 40px 120px;
  }
  .feed-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 40px;
  }
  .feed-card {
    text-decoration: none;
    color: inherit;
    border-radius: 16px;
    transition: background 0.2s;
    padding: 4px;
  }
  .feed-card:hover { background: var(--surface-gray); }
  .feed-card:hover .feed-thumb {
    transform: scale(1.03);
  }
  .feed-thumb-wrap {
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .feed-thumb {
    width: 100%;
    aspect-ratio: 16/10;
    object-fit: cover;
    display: block;
    transition: transform 0.3s ease;
  }
  .feed-tag {
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--green);
    margin-bottom: 8px;
    display: block;
  }
  .feed-title {
    font-size: 1.2rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.5;
    margin-bottom: 8px;
    color: var(--ink);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .feed-desc {
    font-size: 0.9rem;
    color: var(--ink-tertiary);
    line-height: 1.6;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .feed-meta {
    font-size: 0.8rem;
    color: var(--ink-muted);
  }

  /* ── FOOTER ── */
  .footer {
    max-width: 1200px;
    margin: 0 auto;
    padding: 48px 40px 64px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 32px;
  }
  .footer-brand {
    font-size: 1rem;
    font-weight: 800;
    color: var(--green);
    margin-bottom: 12px;
    letter-spacing: -0.02em;
  }
  .footer-info {
    font-size: 0.8rem;
    color: var(--ink-muted);
    line-height: 1.9;
  }
  .footer-links {
    display: flex;
    gap: 24px;
    list-style: none;
  }
  .footer-links a {
    font-size: 0.85rem;
    color: var(--ink-tertiary);
    text-decoration: none;
    font-weight: 500;
    transition: color 0.2s;
  }
  .footer-links a:hover { color: var(--ink); }

  /* ── FLOATING BUTTONS ── */
  .floating-btns {
    position: fixed;
    bottom: 28px;
    right: 28px;
    z-index: 90;
    display: flex;
    gap: 10px;
  }
  .float-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 12px 22px;
    border-radius: 14px;
    font-size: 0.9rem;
    font-weight: 700;
    text-decoration: none;
    border: none;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
  }
  .float-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(0,0,0,0.18);
  }
  .float-kakao { background: #FEE500; color: #191919; }
  .float-naver { background: #03C75A; color: #fff; }

  /* ── RESPONSIVE ── */
  @media (max-width: 960px) {
    .feed-grid { grid-template-columns: repeat(2, 1fr); gap: 32px; }
    .featured-card { grid-template-columns: 1fr; }
    .featured-body { padding: 32px; }
    .page-header { padding: 48px 24px 0; }
    .tabs { padding: 24px 24px 0; }
    .featured { padding: 40px 24px 0; }
    .feed-grid-wrap { padding: 40px 24px 100px; }
    .page-title { font-size: 2rem; }
    .featured-title { font-size: 1.4rem; }
  }

  @media (max-width: 640px) {
    .nav-links { display: none; }
    .nav-links.open {
      display: flex;
      flex-direction: column;
      position: absolute;
      top: 60px;
      left: 0; right: 0;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(20px);
      padding: 20px 24px 28px;
      gap: 14px;
    }
    .nav-toggle { display: block; }
    .nav-inner { padding: 0 20px; }
    .feed-grid { grid-template-columns: 1fr; gap: 32px; }
    .page-header { padding: 36px 20px 0; }
    .tabs { padding: 20px 20px 0; gap: 4px; }
    .tab { padding: 8px 14px; font-size: 0.85rem; }
    .featured { padding: 32px 20px 0; }
    .feed-grid-wrap { padding: 32px 20px 80px; }
    .page-title { font-size: 1.65rem; }
    .featured-body { padding: 24px; }
    .footer { padding: 32px 20px 48px; flex-direction: column; }
  }
</style>
</head>
<body>

<!-- ═══ NAV ═══ -->
<nav class="nav">
  <div class="nav-inner">
    <a href="./main.html" class="nav-logo">코드세무회계</a>
    <button class="nav-toggle" aria-label="메뉴" onclick="document.querySelector('.nav-links').classList.toggle('open')">
      <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
    </button>
    <ul class="nav-links">
      <li><a href="./main.html#services">서비스</a></li>
      <li><a href="./main.html#why">소개</a></li>
      <li><a href="./main.html#reviews">후기</a></li>
      <li><a href="./feed.html" class="active">피드</a></li>
      <li><a href="./jobs.html">채용</a></li>
      <li><a href="./main.html#contact" class="nav-cta">상담 신청</a></li>
    </ul>
  </div>
</nav>

<!-- ═══ PAGE HEADER ═══ -->
<header class="page-header">
  <h1 class="page-title">피드</h1>
  <p class="page-desc">세무, 절세, 사업 운영에 도움되는 콘텐츠를 만나보세요.</p>
</header>

<!-- ═══ CATEGORY TABS ═══ -->
<div class="tabs">
  <button class="tab active" onclick="filterFeed('all', this)">전체</button>
  <button class="tab" onclick="filterFeed('tax', this)">세무 가이드</button>
  <button class="tab" onclick="filterFeed('save', this)">절세 전략</button>
  <button class="tab" onclick="filterFeed('biz', this)">사업 운영</button>
  <button class="tab" onclick="filterFeed('news', this)">뉴스</button>
  <button class="tab" onclick="filterFeed('ai', this)">AI · 테크</button>
</div>

<!-- ═══ FEATURED (동적 렌더링) ═══ -->
<section class="featured" id="featured-section"></section>

<!-- ═══ FEED GRID (동적 렌더링) ═══ -->
<section class="feed-grid-wrap">
  <div class="feed-grid" id="feed-grid"></div>
</section>

<!-- ═══ FLOATING BUTTONS ═══ -->
<div class="floating-btns">
  <a href="#" class="float-btn float-kakao">카톡 상담</a>
  <a href="#" class="float-btn float-naver">네이버 톡톡 상담</a>
</div>

<!-- ═══ FOOTER ═══ -->
<footer class="footer">
  <div>
    <div class="footer-brand">코드세무회계</div>
    <div class="footer-info">
      대표 세무사: 정주희 | 사업자등록번호: 306-29-93669<br>
      서울특별시 강남구 테헤란로1길 28-11, 4층 4035호<br>
      이메일: help@codetax.co.kr
    </div>
  </div>
  <ul class="footer-links">
    <li><a href="#">개인정보처리방침</a></li>
    <li><a href="#">이용약관</a></li>
    <li><a href="./jobs.html">채용공고</a></li>
  </ul>
</footer>

<script>
let allData = null;

// posts.json 로드 → 렌더링
fetch(new URL('posts.json', window.location.href.split('?')[0]).href)
  .then(r => r.json())
  .then(data => {
    allData = data;
    renderFeatured(data.featured);
    renderGrid(data.posts);
  });

function renderFeatured(f) {
  document.getElementById('featured-section').innerHTML = `
    <a href="./post.html?id=${f.id}" class="featured-card" data-cat="${f.category}">
      <img class="featured-img" src="${f.image}" alt="">
      <div class="featured-body">
        <span class="featured-tag">${f.categoryLabel}</span>
        <h2 class="featured-title">${f.title}</h2>
        <p class="featured-desc">${f.desc}</p>
      </div>
    </a>`;
}

function renderGrid(posts) {
  document.getElementById('feed-grid').innerHTML = posts.map(p => `
    <a href="./post.html?id=${p.id}" class="feed-card" data-cat="${p.category}">
      <div class="feed-thumb-wrap">
        <img class="feed-thumb" src="${p.image}" alt="">
      </div>
      <span class="feed-tag">${p.categoryLabel}</span>
      <h3 class="feed-title">${p.title}</h3>
      <p class="feed-desc">${p.desc}</p>
      <span class="feed-meta">${p.date} · ${p.readTime}</span>
    </a>`).join('');
}

function filterFeed(cat, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');

  if (!allData) return;

  // Featured
  const featured = document.querySelector('.featured-card');
  if (featured) {
    featured.style.display = (cat === 'all' || allData.featured.category === cat) ? '' : 'none';
  }

  // Grid
  if (cat === 'all') {
    renderGrid(allData.posts);
  } else {
    renderGrid(allData.posts.filter(p => p.category === cat));
  }
}
</script>

</body>
</html>
